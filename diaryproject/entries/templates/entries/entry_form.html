<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>New Entry</title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'entries/css/style.css' %}">
    </head>

    <body>
        <div class="app">

            <!-- Top Bar -->
            <div class="topbar">
                <a href="{% url 'entry_list' %}" class="btn btn-secondary entry-detail-back">← Back</a>
                <div class="avatar"></div>
            </div>

            <header class="entry-header-group">
                <span id="liveDate" class="current-date-stamp"></span>
                <h1 class="page-title">New entry</h1>
            </header>

            <form method="POST">
                {% csrf_token %}
                {{ form.non_field_errors }}

                <!-- Title Field -->
                <div class="form-group">
                    {{ form.title }}
                </div>

                <!-- Content Field -->
                <div class="form-group">
                    {{ form.content }} 
                </div>

                <!-- Voice Panel -->
                <section class="voice-panel" aria-label="Voice recorder">
                    <div class="waveform" role="img" aria-label="Audio waveform"></div>
                    <div class="voice-controls">
                        <button type="button" class="voice-btn" id="clearBtn">Clear</button>
                        <button type="button" class="voice-btn record" id="micBtn">Record/Stop</button>
                        <button type="submit" class="voice-btn">Save</button>
                    </div>
                </section>

            </form>

        </div>

        {% load static %}
        <script src="{% static 'entries/js/script.js' %}"></script>
    </body>
</html>
