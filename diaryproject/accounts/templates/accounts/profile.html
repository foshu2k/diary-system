{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMEN: Profile</title>
  <link rel="stylesheet" href="{% static 'accounts/style.css' %}">
</head>
<body class="auth-body">
  <div class="profile-wrap">
    <a href="{% url 'home' %}" class="back-btn">&larr; Back</a>

    <div class="name-pill">{{ user.username }}</div>

    <div class="stats-card">
      <p class="stats-label">Total Journal Entries</p>
      <div class="stats-circle">{{ entry_count }}</div>

      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit" class="logout-btn">Log out</button>
      </form>
    </div>
  </div>
</body>
</html>
